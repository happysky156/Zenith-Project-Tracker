# Recommended for Streamlit Cloud shared deployment:
# Use Supabase PostgreSQL connection pooler URL here.
# DATABASE_URL = "postgresql://USER:PASSWORD@HOST:6543/postgres?sslmode=require"

# Optional legacy fallback only. Do not use this if USER_ACCESS_CODES is configured.
# INTERNAL_ACCESS_CODE = "legacy-shared-code"

# Supabase Auth email OTP is not required in this internal-code login version.
# SUPABASE_URL = "https://your-project.supabase.co"
# SUPABASE_ANON_KEY = "your-supabase-anon-key"


# AI Meeting Assistant / DeepSeek API settings
# Fill these values in Streamlit Cloud Secrets, not in GitHub.
[AI]
DEEPSEEK_API_KEY = "sk-your-deepseek-api-key"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
DEEPSEEK_MODEL = "deepseek-chat"
AI_TIMEOUT_SECONDS = 45
AI_MAX_TOKENS = 1200
